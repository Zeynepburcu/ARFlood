<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AR Floor Test — Pink Stickers</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; display:none; z-index:0; }
  canvas { position:fixed; inset:0; z-index:1; }

  #overlay { position:fixed; inset:0; z-index:10; pointer-events:none; }
  #overlay > * { pointer-events:auto; }

  #startScreen { position:fixed; inset:0; z-index:20; background:linear-gradient(160deg,#1f0418,#400a2c);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:32px; text-align:center; }
  #startScreen h1 { color:#ffd9f0; font-size:28px; font-weight:600; }
  #startScreen p { color:#d19cbd; font-size:14px; line-height:1.55; max-width:330px; }
  #startBtn { padding:17px 52px; font-size:19px; font-weight:600; color:#32021f;
    background:linear-gradient(135deg,#ff9fd8,#ff4fae); border:none; border-radius:40px;
    box-shadow:0 8px 30px rgba(255,80,175,.45); }
  #startBtn:active { transform:scale(.96); }
  #startBtn:disabled { opacity:.6; }

  #hud { position:fixed; top:calc(env(safe-area-inset-top) + 12px); left:50%; transform:translateX(-50%);
    display:none; flex-direction:column; gap:4px; align-items:center;
    background:rgba(30,4,20,.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    padding:10px 18px; border-radius:16px; border:1px solid rgba(255,140,210,.28);
    color:#ffd9f0; font-size:12px; font-variant-numeric:tabular-nums; text-align:center; line-height:1.5; }
  #hud b { color:#fff; font-weight:600; }

  #btnRow { position:fixed; bottom:calc(env(safe-area-inset-bottom) + 22px); left:50%; transform:translateX(-50%);
    display:none; gap:10px; }
  .btn { padding:13px 22px; font-size:14px; font-weight:600; border:none; border-radius:30px;
    background:rgba(30,4,20,.7); backdrop-filter:blur(10px); color:#ffd9f0;
    border:1px solid rgba(255,140,210,.3); }
  .btn.primary { background:linear-gradient(135deg,#ff9fd8,#ff4fae); color:#32021f; border:none; }
  .btn:active { transform:scale(.95); }

  #err { position:fixed; bottom:110px; left:50%; transform:translateX(-50%); display:none;
    color:#ffd9d9; background:rgba(70,10,10,.8); padding:11px 18px; border-radius:14px; font-size:13px;
    max-width:88vw; text-align:center; }
</style>
</head>
<body>

<video id="cam" playsinline muted autoplay></video>

<div id="overlay">
  <div id="hud"></div>
  <div id="btnRow">
    <button class="btn primary" id="placeBtn">Place sticker</button>
    <button class="btn" id="gridBtn">Drop grid</button>
    <button class="btn" id="clearBtn">Clear</button>
  </div>
  <div id="err"></div>
</div>

<div id="startScreen">
  <h1>Floor Test</h1>
  <p id="startDesc">This drops pink stickers onto the detected floor. If they sit flat on the ground and stay put as you walk, tracking is good.</p>
  <button id="startBtn">Start</button>
</div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }}
</script>

<script type="module">
import * as THREE from 'three';

const $ = id => document.getElementById(id);
const startScreen=$('startScreen'), startBtn=$('startBtn'), startDesc=$('startDesc'),
      hud=$('hud'), btnRow=$('btnRow'), errBox=$('err'), camVideo=$('cam');

let renderer, scene, camera, mode=null;
let hitTestSource=null, refSpace=null, reticle=null;
let floorY = -1.45;
const stickers = new THREE.Group();
let lastHitY = null, hitCount = 0;

async function detectMode(){
  try { if (navigator.xr && await navigator.xr.isSessionSupported('immersive-ar')) return 'webxr'; }
  catch(e){}
  return 'gyro';
}

/* ---------- sticker factory: flat pink disc with a ring + centre dot ---------- */
function makeSticker(){
  const g = new THREE.Group();

  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(0.11, 40),
    new THREE.MeshBasicMaterial({ color:0xff3ea5, transparent:true, opacity:0.55,
                                  side:THREE.DoubleSide, depthWrite:false })
  );
  disc.rotation.x = -Math.PI/2;
  g.add(disc);

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.115, 0.145, 40),
    new THREE.MeshBasicMaterial({ color:0xff85c8, transparent:true, opacity:0.95,
                                  side:THREE.DoubleSide, depthWrite:false })
  );
  ring.rotation.x = -Math.PI/2;
  g.add(ring);

  // tiny vertical pin so you can judge whether it's lying flat or floating
  const pin = new THREE.Mesh(
    new THREE.CylinderGeometry(0.004,0.004,0.10,8),
    new THREE.MeshBasicMaterial({ color:0xffffff })
  );
  pin.position.y = 0.05;
  g.add(pin);

  g.renderOrder = 3;
  return g;
}

function addSticker(x,y,z){
  const s = makeSticker();
  s.position.set(x,y,z);
  stickers.add(s);
  updateHud();
}

/* a 5x5 grid centred on the reticle, to show whether the whole plane is level */
function dropGrid(cx,cy,cz){
  const step = 0.4;
  for (let i=-2;i<=2;i++)
    for (let j=-2;j<=2;j++)
      addSticker(cx + i*step, cy, cz + j*step);
}

function initThree(){
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.01, 120);
  scene.add(stickers);

  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function updateHud(){
  const camY = camera ? camera.position.y.toFixed(2) : '—';
  const hitTxt = lastHitY===null ? 'none yet' : lastHitY.toFixed(3)+' m';
  hud.innerHTML =
    `mode: <b>${mode}</b> &nbsp;·&nbsp; stickers: <b>${stickers.children.length}</b><br>` +
    `camera Y: <b>${camY} m</b> &nbsp;·&nbsp; floor Y: <b>${floorY.toFixed(3)} m</b><br>` +
    `last hit Y: <b>${hitTxt}</b> &nbsp;·&nbsp; hits: <b>${hitCount}</b>`;
}

/* ---------------- WebXR (Galaxy / Android) ---------------- */
async function startWebXR(){
  initThree();
  renderer.xr.enabled = true;

  const session = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures:['hit-test','local-floor'],
    optionalFeatures:['dom-overlay'],
    domOverlay:{ root: $('overlay') }
  });
  renderer.xr.setReferenceSpaceType('local-floor');
  await renderer.xr.setSession(session);

  refSpace = await session.requestReferenceSpace('local-floor');
  const viewerSpace = await session.requestReferenceSpace('viewer');
  hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
  floorY = 0;

  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.07,0.09,32).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial({color:0x66ff9f})
  );
  reticle.visible=false;
  scene.add(reticle);

  session.addEventListener('end', ()=>location.reload());
  showUI();

  renderer.setAnimationLoop((t, frame)=>{
    if (frame && hitTestSource){
      const hits = frame.getHitTestResults(hitTestSource);
      if (hits.length){
        const p = hits[0].getPose(refSpace).transform.position;
        reticle.visible = true;
        reticle.position.set(p.x,p.y,p.z);
        lastHitY = p.y; hitCount++;
      } else reticle.visible = false;
    }
    const vc = renderer.xr.getCamera();
    camera.position.copy(vc.position);
    if (hitCount % 15 === 0) updateHud();
    renderer.render(scene, camera);
  });
}

/* ---------------- Gyro fallback (iPhone) ---------------- */
let deviceQuat = new THREE.Quaternion(), orientationReady=false;
const zee=new THREE.Vector3(0,0,1), euler=new THREE.Euler();
const q1=new THREE.Quaternion(-Math.sqrt(0.5),0,0,Math.sqrt(0.5)), qOr=new THREE.Quaternion();

function onOrient(e){
  if (e.alpha==null) return;
  euler.set(THREE.MathUtils.degToRad(e.beta),
            THREE.MathUtils.degToRad(e.alpha),
            -THREE.MathUtils.degToRad(e.gamma), 'YXZ');
  deviceQuat.setFromEuler(euler);
  deviceQuat.multiply(q1);
  deviceQuat.multiply(qOr.setFromAxisAngle(zee,
    -THREE.MathUtils.degToRad(screen.orientation?.angle ?? window.orientation ?? 0)));
  orientationReady = true;
}

async function startGyro(){
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function'){
    try {
      const r = await DeviceOrientationEvent.requestPermission();
      if (r !== 'granted') showErr('Motion denied — stickers will not track. Enable Motion & Orientation Access in Settings › Safari.');
    } catch(e){ showErr('Motion unavailable — stickers will not track.'); }
  }
  addEventListener('deviceorientation', onOrient, true);

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ideal:'environment'}, width:{ideal:1920}, height:{ideal:1080} }, audio:false });
  camVideo.srcObject = stream;
  camVideo.style.display = 'block';
  await camVideo.play();

  initThree();
  camera.position.set(0,0,0);
  floorY = -1.45;
  showUI();

  renderer.setAnimationLoop(()=>{
    if (orientationReady) camera.quaternion.copy(deviceQuat);
    renderer.render(scene, camera);
  });
}

/* ---------- where to put a sticker in each mode ---------- */
function currentTarget(){
  if (mode === 'webxr' && reticle && reticle.visible)
    return reticle.position.clone();
  // gyro: project the screen centre ray onto the assumed floor plane
  const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  if (dir.y >= -0.05) return null;              // not looking down enough
  const t = (floorY - camera.position.y) / dir.y;
  return camera.position.clone().addScaledVector(dir, t);
}

$('placeBtn').addEventListener('click', ()=>{
  const p = currentTarget();
  if (!p){ showErr('Aim further down at the floor.'); setTimeout(()=>errBox.style.display='none',1800); return; }
  addSticker(p.x, p.y, p.z);
});
$('gridBtn').addEventListener('click', ()=>{
  const p = currentTarget();
  if (!p){ showErr('Aim further down at the floor.'); setTimeout(()=>errBox.style.display='none',1800); return; }
  dropGrid(p.x, p.y, p.z);
});
$('clearBtn').addEventListener('click', ()=>{
  while (stickers.children.length) stickers.remove(stickers.children[0]);
  updateHud();
});

function showUI(){
  startScreen.style.display='none';
  hud.style.display='flex';
  btnRow.style.display='flex';
  updateHud();
}
function showErr(m){ errBox.style.display='block'; errBox.textContent=m; }

startBtn.addEventListener('click', async ()=>{
  startBtn.disabled=true; startBtn.textContent='Starting…';
  try{
    mode = await detectMode();
    if (mode==='webxr') await startWebXR(); else await startGyro();
  }catch(err){
    startBtn.disabled=false; startBtn.textContent='Start';
    showErr('Could not start: '+(err.message||err));
  }
});

detectMode().then(m=>{
  startDesc.textContent = m==='webxr'
    ? 'Real plane detection is available. Sweep the phone over the floor until the green ring appears, then tap Place or Drop grid.'
    : 'No WebXR here, so this uses camera + gyro with an assumed floor. Aim down at the floor and tap Place.';
});
</script>
</body>
</html>
