<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AR Flood</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  #cam { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; display:none; z-index:0; }
  canvas { position:fixed; inset:0; z-index:1; }

  #overlay { position:fixed; inset:0; z-index:10; pointer-events:none; }
  #overlay > * { pointer-events:auto; }

  #startScreen { position:fixed; inset:0; z-index:20; background:linear-gradient(160deg,#04121f,#0a2740);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px; padding:32px; text-align:center; }
  #startScreen h1 { color:#dff2ff; font-size:30px; font-weight:600; letter-spacing:.5px; }
  #startScreen p { color:#8fb6cf; font-size:14px; line-height:1.55; max-width:320px; }
  #startBtn { padding:17px 52px; font-size:19px; font-weight:600; color:#012032;
    background:linear-gradient(135deg,#7fe3ff,#3aa9e0); border:none; border-radius:40px;
    box-shadow:0 8px 30px rgba(60,180,240,.45); }
  #startBtn:active { transform:scale(.96); }
  #startBtn:disabled { opacity:.6; }

  #sliderWrap { position:fixed; left:16px; top:50%; transform:translateY(-50%);
    display:none; flex-direction:column; align-items:center; gap:10px;
    background:rgba(4,20,32,.55); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    padding:16px 10px; border-radius:22px; border:1px solid rgba(140,220,255,.22); }
  #slider { -webkit-appearance:none; appearance:none; width:190px; height:34px; background:transparent;
    transform:rotate(-90deg); transform-origin:center; margin:78px -78px; }
  #slider::-webkit-slider-runnable-track { height:7px; border-radius:4px;
    background:linear-gradient(90deg,#0d3a52,#49c6ff); }
  #slider::-webkit-slider-thumb { -webkit-appearance:none; width:27px; height:27px; border-radius:50%;
    background:#eaf9ff; border:3px solid #3aa9e0; margin-top:-10px; box-shadow:0 2px 10px rgba(0,0,0,.5); }
  #slider::-moz-range-track { height:7px; border-radius:4px; background:#0d3a52; }
  #slider::-moz-range-thumb { width:27px; height:27px; border-radius:50%; background:#eaf9ff; border:3px solid #3aa9e0; }
  #depthLabel { color:#bfe6ff; font-size:12px; font-variant-numeric:tabular-nums; letter-spacing:.5px; }
  #waveIcon { font-size:17px; }

  #hint { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); display:none;
    color:#cfe9f8; font-size:13px; background:rgba(4,20,32,.6); backdrop-filter:blur(10px);
    padding:9px 18px; border-radius:20px; border:1px solid rgba(140,220,255,.2); max-width:88vw; text-align:center; }
  #err { position:fixed; bottom:26px; left:50%; transform:translateX(-50%); display:none;
    color:#ffd9d9; background:rgba(70,10,10,.75); padding:11px 18px; border-radius:14px; font-size:13px;
    max-width:88vw; text-align:center; }
</style>
</head>
<body>

<video id="cam" playsinline muted autoplay></video>

<div id="overlay">
  <div id="sliderWrap">
    <span id="waveIcon">🌊</span>
    <input id="slider" type="range" min="0" max="180" value="35" step="1">
    <span id="depthLabel">0.35 m</span>
  </div>
  <div id="hint"></div>
  <div id="err"></div>
</div>

<div id="startScreen">
  <h1>AR Flood</h1>
  <p id="startDesc">Point your phone at the floor and press Start. Water will fill the room around you.</p>
  <button id="startBtn">Start</button>
</div>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
}}
</script>

<script type="module">
import * as THREE from 'three';

const $ = id => document.getElementById(id);
const startScreen=$('startScreen'), startBtn=$('startBtn'), startDesc=$('startDesc'),
      sliderWrap=$('sliderWrap'), slider=$('slider'), depthLabel=$('depthLabel'),
      hint=$('hint'), errBox=$('err'), camVideo=$('cam');

let renderer, scene, camera, water, waterMat, clock=new THREE.Clock();
let mode = null;                 // 'webxr' | 'gyro'
let floorY = -1.45;              // metres below eye level
let waterHeight = 0.35;
let hitTestSource=null, refSpace=null;
let reticle;

/* ---------------- capability detection ---------------- */
async function detectMode(){
  try {
    if (navigator.xr && await navigator.xr.isSessionSupported('immersive-ar')) return 'webxr';
  } catch(e){}
  return 'gyro';
}

/* ---------------- water shader ---------------- */
const vert = `
uniform float uTime;
varying vec3 vWorld;
varying float vWave;
float h(vec2 p){
  return sin(p.x*1.7 + uTime*1.1)*0.5
       + sin(p.y*2.3 - uTime*0.9)*0.4
       + sin((p.x+p.y)*3.1 + uTime*1.6)*0.22
       + sin((p.x-p.y)*5.3 - uTime*2.1)*0.09;
}
void main(){
  vec3 p = position;
  float w = h(p.xy) * 0.022;
  p.z += w;
  vWave = w;
  vec4 wp = modelMatrix * vec4(p,1.0);
  vWorld = wp.xyz;
  gl_Position = projectionMatrix * viewMatrix * wp;
}`;

const frag = `
precision highp float;
uniform float uTime;
uniform vec3  uCamPos;
uniform vec3  uShallow;
uniform vec3  uDeep;
varying vec3 vWorld;
varying float vWave;

vec3 normalAt(vec2 p){
  float e = 0.06;
  float hx = sin((p.x+e)*1.7+uTime*1.1)*0.5 + sin(p.y*2.3-uTime*0.9)*0.4
           - (sin((p.x-e)*1.7+uTime*1.1)*0.5 + sin(p.y*2.3-uTime*0.9)*0.4);
  float hy = sin(p.x*1.7+uTime*1.1)*0.5 + sin((p.y+e)*2.3-uTime*0.9)*0.4
           - (sin(p.x*1.7+uTime*1.1)*0.5 + sin((p.y-e)*2.3-uTime*0.9)*0.4);
  return normalize(vec3(-hx*0.35, 1.0, -hy*0.35));
}

void main(){
  vec3 N = normalAt(vWorld.xz);
  vec3 V = normalize(uCamPos - vWorld);
  float fres = pow(1.0 - clamp(dot(N,V),0.0,1.0), 3.0);

  float d = clamp(length(vWorld.xz - uCamPos.xz)/9.0, 0.0, 1.0);
  vec3 base = mix(uShallow, uDeep, d*0.85 + vWave*3.0);

  vec3 refl = mix(vec3(0.55,0.75,0.88), vec3(0.90,0.96,1.0), fres);
  vec3 col = mix(base, refl, fres*0.82);

  vec3 L = normalize(vec3(0.4,1.0,0.25));
  float spec = pow(max(dot(reflect(-L,N),V),0.0), 90.0);
  col += vec3(1.0,0.99,0.94) * spec * 0.65;

  col += smoothstep(0.014,0.024,vWave) * 0.10;

  float alpha = mix(0.62, 0.94, fres);
  alpha *= smoothstep(0.0, 0.12, d + 0.05);
  gl_FragColor = vec4(col, alpha);
}`;

function buildWater(){
  const geo = new THREE.PlaneGeometry(60, 60, 260, 260);
  waterMat = new THREE.ShaderMaterial({
    vertexShader: vert, fragmentShader: frag,
    transparent:true, depthWrite:false, side:THREE.DoubleSide,
    uniforms:{
      uTime:{value:0},
      uCamPos:{value:new THREE.Vector3()},
      uShallow:{value:new THREE.Color(0x2f9fc4)},
      uDeep:{value:new THREE.Color(0x06304f)}
    }
  });
  water = new THREE.Mesh(geo, waterMat);
  water.rotation.x = -Math.PI/2;
  water.renderOrder = 2;
  scene.add(water);
}

function initThree(){
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true, powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth, innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.01, 120);
  scene.add(new THREE.HemisphereLight(0xdff4ff, 0x223344, 1.1));
  buildWater();
  addEventListener('resize', ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
}

function updateWaterY(){
  if (water) water.position.y = floorY + waterHeight;
}

/* ---------------- WebXR path (Android / Galaxy) ---------------- */
async function startWebXR(){
  initThree();
  renderer.xr.enabled = true;

  const session = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures:['hit-test','local-floor'],
    optionalFeatures:['dom-overlay'],
    domOverlay:{ root: $('overlay') }
  });
  renderer.xr.setReferenceSpaceType('local-floor');
  await renderer.xr.setSession(session);

  refSpace = await session.requestReferenceSpace('local-floor');
  const viewerSpace = await session.requestReferenceSpace('viewer');
  hitTestSource = await session.requestHitTestSource({ space: viewerSpace });

  floorY = 0;                    // local-floor puts y=0 at the ground
  updateWaterY();

  reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.09,0.11,32).rotateX(-Math.PI/2),
    new THREE.MeshBasicMaterial({color:0x8fe6ff, transparent:true, opacity:0.9})
  );
  reticle.visible=false; scene.add(reticle);

  session.addEventListener('end', ()=>{ location.reload(); });
  showUI('Tap the floor to fine-tune the surface level.');

  session.addEventListener('select', ()=>{
    if (reticle.visible){
      floorY = reticle.position.y;
      updateWaterY();
      hint.style.opacity='1';
      hint.textContent = 'Floor set. Use the slider to raise the water.';
    }
  });

  renderer.setAnimationLoop((t, frame)=>{
    if (frame && hitTestSource){
      const hits = frame.getHitTestResults(hitTestSource);
      if (hits.length){
        const pose = hits[0].getPose(refSpace);
        reticle.visible = true;
        reticle.position.set(pose.transform.position.x, pose.transform.position.y, pose.transform.position.z);
      } else reticle.visible = false;
    }
    render();
  });
}

/* ---------------- Gyro + camera fallback (iPhone) ---------------- */
let deviceQuat = new THREE.Quaternion();
let orientationReady = false;

async function startGyro(){
  // iOS requires the permission prompt to fire inside the user gesture,
  // so request motion access before the camera await.
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function'){
    try {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') showErr('Motion access denied — the view will not track. Enable Motion & Orientation Access in Settings › Safari.');
    } catch(e){
      showErr('Motion access unavailable — the view will not track.');
    }
  }
  addEventListener('deviceorientation', onOrient, true);

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:{ ideal:'environment' }, width:{ideal:1920}, height:{ideal:1080} }, audio:false
  });
  camVideo.srcObject = stream;
  camVideo.style.display='block';
  await camVideo.play();

  initThree();

  floorY = -1.45;               // assumed eye height above floor
  updateWaterY();
  camera.position.set(0,0,0);
  showUI('Hold the phone upright. Slider raises the water.');

  renderer.setAnimationLoop(()=>{
    if (orientationReady) camera.quaternion.copy(deviceQuat);
    render();
  });
}

const zee = new THREE.Vector3(0,0,1);
const euler = new THREE.Euler();
const q1 = new THREE.Quaternion(-Math.sqrt(0.5),0,0,Math.sqrt(0.5)); // -PI/2 about X
const qOrient = new THREE.Quaternion();
function onOrient(e){
  if (e.alpha===null || e.alpha===undefined) return;
  const a = THREE.MathUtils.degToRad(e.alpha);
  const b = THREE.MathUtils.degToRad(e.beta);
  const g = THREE.MathUtils.degToRad(e.gamma);
  const o = THREE.MathUtils.degToRad(screen.orientation?.angle ?? window.orientation ?? 0);
  euler.set(b, a, -g, 'YXZ');
  deviceQuat.setFromEuler(euler);
  deviceQuat.multiply(q1);
  deviceQuat.multiply(qOrient.setFromAxisAngle(zee, -o));
  orientationReady = true;
}

/* ---------------- shared render ---------------- */
function render(){
  const dt = clock.getElapsedTime();
  waterMat.uniforms.uTime.value = dt;
  camera.getWorldPosition(waterMat.uniforms.uCamPos.value);
  const cp = waterMat.uniforms.uCamPos.value;
  water.position.x = cp.x; water.position.z = cp.z;
  renderer.render(scene, camera);
}

/* ---------------- UI ---------------- */
function showUI(msg){
  startScreen.style.display='none';
  sliderWrap.style.display='flex';
  hint.style.display='block';
  hint.textContent=msg;
  setTimeout(()=>{ hint.style.transition='opacity .8s'; hint.style.opacity='0'; }, 6000);
}
function showErr(m){ errBox.style.display='block'; errBox.textContent=m; }

slider.addEventListener('input', ()=>{
  waterHeight = slider.value/100;
  depthLabel.textContent = waterHeight.toFixed(2)+' m';
  updateWaterY();
});

startBtn.addEventListener('click', async ()=>{
  startBtn.disabled=true; startBtn.textContent='Starting…';
  try{
    mode = await detectMode();
    if (mode==='webxr') await startWebXR();
    else await startGyro();
  }catch(err){
    startBtn.disabled=false; startBtn.textContent='Start';
    showErr('Could not start: '+(err.message||err));
  }
});

detectMode().then(m=>{
  startDesc.textContent = m==='webxr'
    ? 'Point your phone at the floor and press Start. Move slowly so the floor is detected, then tap to place the surface.'
    : 'Your browser has no full AR support, so a camera + motion mode will be used. Hold the phone upright and press Start.';
});
</script>
</body>
</html>
